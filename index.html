<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>اختبر معلوماتك | لوحة صدارة عالمية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Tajawal', system-ui, 'Cairo', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0b1120 0%, #111827 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
        }

        .app-container {
            max-width: 1300px;
            width: 100%;
            margin: 0 auto;
        }

        .hero {
            text-align: center;
            margin-bottom: 2rem;
        }

        .hero h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #fbbf24, #ff7b2c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .hero p {
            color: #9ca3af;
            font-size: 1.1rem;
            margin-top: 0.5rem;
        }

        .dashboard {
            display: flex;
            flex-wrap: wrap;
            gap: 1.8rem;
            justify-content: center;
        }

        .quiz-panel {
            flex: 2;
            min-width: 280px;
            background: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 1.8rem;
            border: 1px solid rgba(251, 191, 36, 0.4);
        }

        .leaderboard-panel {
            flex: 1.2;
            min-width: 260px;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            padding: 1.5rem;
            border: 1px solid #374151;
        }

        .quiz-meta {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            gap: 1rem;
            border-bottom: 1px dashed #334155;
            padding-bottom: 1rem;
        }

        .category-badge {
            background: #facc15;
            color: #0f172a;
            font-weight: bold;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            font-size: 0.85rem;
        }

        .score-timer {
            display: flex;
            gap: 1.2rem;
        }

        .score-box, .timer-box {
            background: #0f172a;
            padding: 0.3rem 1rem;
            border-radius: 2rem;
            font-weight: bold;
        }

        .score-box span:first-child, .timer-box span:first-child {
            color: #94a3b8;
            font-size: 0.8rem;
        }

        .score-box span:last-child, .timer-box span:last-child {
            color: #facc15;
            font-size: 1.3rem;
            font-weight: 800;
            margin-right: 0.3rem;
        }

        .question-text {
            font-size: 1.6rem;
            font-weight: 700;
            color: #f1f5f9;
            margin: 1.5rem 0 1.8rem 0;
            line-height: 1.4;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
            margin-bottom: 2rem;
        }

        .option-btn {
            background: #1e293b;
            border: 2px solid #334155;
            border-radius: 1.2rem;
            padding: 0.9rem 1.2rem;
            text-align: right;
            font-size: 1rem;
            font-weight: 500;
            color: #e2e8f0;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .option-btn:hover:not(:disabled) {
            background: #2d3a5e;
            border-color: #facc15;
            transform: scale(0.99);
        }

        .option-prefix {
            font-weight: 800;
            color: #facc15;
            margin-left: 0.8rem;
        }

        .option-btn.correct-highlight {
            background: #15803d;
            border-color: #4ade80;
            color: white;
        }

        .option-btn.wrong-highlight {
            background: #b91c1c;
            border-color: #f87171;
            color: white;
        }

        .disabled-btn {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .next-btn {
            background: linear-gradient(95deg, #facc15, #f59e0b);
            border: none;
            width: 100%;
            padding: 0.9rem;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 2rem;
            color: #0f172a;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 5px 0 #b45309;
            margin-top: 0.5rem;
        }

        .next-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #b45309;
        }

        .next-btn:disabled {
            opacity: 0.5;
            transform: none;
            cursor: default;
        }

        .quiz-footer {
            margin-top: 1.8rem;
            text-align: center;
            font-size: 0.85rem;
            color: #64748b;
        }

        .leaderboard-header {
            font-size: 1.5rem;
            font-weight: bold;
            color: #facc15;
            text-align: center;
            margin-bottom: 1rem;
        }

        .leaderboard-list {
            list-style: none;
            max-height: 380px;
            overflow-y: auto;
            margin: 1rem 0;
        }

        .leaderboard-item {
            background: #0f172a;
            margin: 0.6rem 0;
            padding: 0.7rem 1rem;
            border-radius: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.7rem;
            border-right: 3px solid #facc15;
        }

        .rank {
            font-size: 1.3rem;
            font-weight: 800;
            width: 35px;
            color: #facc15;
        }

        .player-name {
            flex: 1;
            color: #f1f5f9;
            font-size: 0.95rem;
        }

        .player-score {
            background: #0000004d;
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
            color: #facc15;
            font-weight: bold;
        }

        .player-time {
            font-size: 0.75rem;
            color: #94a3b8;
        }

        .leaderboard-empty {
            text-align: center;
            color: #9ca3af;
            padding: 2rem 1rem;
            font-style: italic;
            background: #0f172a;
            border-radius: 1rem;
            margin: 1rem 0;
        }

        .loading {
            text-align: center;
            color: #facc15;
            padding: 1rem;
        }

        .name-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .name-card {
            background: #1e293b;
            border-radius: 2rem;
            padding: 2rem;
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #facc15;
        }

        .name-card h3 {
            color: #facc15;
            margin-bottom: 1rem;
        }

        .name-card input {
            width: 100%;
            padding: 0.8rem;
            border-radius: 2rem;
            border: none;
            background: #0f172a;
            color: white;
            font-size: 1rem;
            text-align: center;
            margin: 1rem 0;
        }

        .name-card button {
            background: #facc15;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 2rem;
            font-weight: bold;
            cursor: pointer;
        }

        @media (max-width: 750px) {
            .question-text { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="app-container" id="appRoot"></div>

<script>
    // ================== إعدادات Supabase (ضع قيمك هنا) ==================
    const SUPABASE_URL = "https://tpnzhzpydszmiwncckk.supabase.co";  // ضع Project URL هنا
    const SUPABASE_ANON_KEY = "sb_publishable_lpE_UQYr3JDxM-eb2l2zUg_SdHXCT2B";  // ضع anon key هنا
    // ==================================================================

    const QUIZ_SET = [
        { category: "🔬 علوم", question: "ما هو المعدن السائل في درجة حرارة الغرفة؟", options: ["الزئبق", "الذهب", "الألماس", "الحديد"], correct: 0 },
        { category: "🐆 علوم", question: "ما هو أسرع حيوان بري في العالم؟", options: ["الأسد", "الفهد", "النمر", "الغزال"], correct: 1 },
        { category: "📜 تاريخ", question: "في أي عام انتهت الحرب العالمية الثانية؟", options: ["1943", "1944", "1945", "1946"], correct: 2 },
        { category: "🌎 تاريخ", question: "من هو مكتشف أمريكا؟", options: ["فاسكو دا غاما", "كولومبوس", "ماجلان", "ماركو بولو"], correct: 1 },
        { category: "⚽ رياضة", question: "كم عدد لاعبي كرة القدم في الملعب؟", options: ["10", "11", "12", "9"], correct: 1 },
        { category: "🐫 رياضة", question: "ما هو الحيوان الملقب بسفينة الصحراء؟", options: ["الحصان", "الجمل", "النعامة", "الضبع"], correct: 1 },
        { category: "🎮 ألغاز", question: "ما هو الشيء الذي له أسنان ولا يعض؟", options: ["المشط", "المقص", "السكين", "المنشار"], correct: 0 },
        { category: "⏳ ألغاز", question: "ما هو الشيء الذي كلما زاد نقص؟", options: ["العمر", "المال", "الوقت", "الحلم"], correct: 0 },
        { category: "🌿 علوم", question: "ما الغاز الذي تمتصه النباتات للبناء الضوئي؟", options: ["الأكسجين", "ثاني أكسيد الكربون", "النيتروجين", "الهيدروجين"], correct: 1 },
        { category: "🗾 تاريخ", question: "ما هي عاصمة اليابان؟", options: ["بكين", "سيؤول", "طوكيو", "بانكوك"], correct: 2 },
        { category: "🏙️ عمارة", question: "ما هو أطول مبنى في العالم؟", options: ["برج خليفة", "برج شنغهاي", "برج إيفل", "تايبيه 101"], correct: 0 },
        { category: "💧 ألغاز", question: "ما الذي يمشي بلا أرجل؟", options: ["الريح", "النهر", "الظل", "الصوت"], correct: 1 },
        { category: "🪐 علوم", question: "كم كوكباً في مجموعتنا الشمسية؟", options: ["7", "8", "9", "6"], correct: 1 },
        { category: "🇪🇬 تاريخ", question: "ما الدولة التي تسمى أرض النيل؟", options: ["السودان", "مصر", "أوغندا", "إثيوبيا"], correct: 1 },
        { category: "⛰️ علوم", question: "ما الصخر الناتج عن تبريد الماغما؟", options: ["رسوبي", "ناري", "متحول", "جيري"], correct: 1 }
    ];

    let currentQuestions = [...QUIZ_SET];
    let currentIndex = 0, userScore = 0, quizActive = true, answerLock = false;
    let currentQuestionTimer = null, timeElapsed = 0, totalTimeTaken = 0, questionsCount = 0;
    let currentPlayer = null;

    const appContainer = document.getElementById('appRoot');

    // دالة لحفظ النتيجة في Supabase
    async function saveScoreToSupabase(playerName, score, totalTime) {
        try {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/quiz_scores`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'apikey': SUPABASE_ANON_KEY,
                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                },
                body: JSON.stringify({
                    player_name: playerName,
                    score: score,
                    total_time: totalTime
                })
            });
            if (!response.ok) console.error("خطأ في الحفظ");
        } catch(e) { console.error(e); }
    }

    // دالة لجلب النتائج من Supabase
    async function fetchLeaderboard() {
        try {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/quiz_scores?order=score.desc,id.asc&limit=20`, {
                headers: {
                    'apikey': SUPABASE_ANON_KEY,
                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                }
            });
            if (!response.ok) return [];
            return await response.json();
        } catch(e) {
            console.error(e);
            return [];
        }
    }

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
    }

    function stopTimer() { if (currentQuestionTimer) { clearInterval(currentQuestionTimer); currentQuestionTimer = null; } }
    function startTimer() {
        stopTimer();
        timeElapsed = 0;
        updateTimerDisplay();
        currentQuestionTimer = setInterval(() => {
            if (!quizActive || answerLock || currentIndex >= currentQuestions.length) return;
            timeElapsed++;
            updateTimerDisplay();
        }, 1000);
    }
    function updateTimerDisplay() { const span = document.getElementById('questionTimer'); if(span) span.innerText = `${timeElapsed}s`; }

    async function onSelectAnswer(optionIndex) {
        if (!quizActive || answerLock || currentIndex >= currentQuestions.length) return;
        const currentQ = currentQuestions[currentIndex];
        const isCorrect = (optionIndex === currentQ.correct);
        answerLock = true;
        totalTimeTaken += timeElapsed;
        questionsCount++;
        if (isCorrect) userScore++;
        
        renderFeedbackAndNext(optionIndex, currentQ.correct);
        
        setTimeout(async () => {
            if (currentIndex + 1 < currentQuestions.length) {
                currentIndex++;
                answerLock = false;
                timeElapsed = 0;
                stopTimer();
                startTimer();
                renderQuizPanel();
            } else {
                quizActive = false;
                answerLock = true;
                stopTimer();
                await saveScoreToSupabase(currentPlayer, userScore, totalTimeTaken);
                await renderQuizPanel();
                await renderLeaderboard();
            }
        }, 1300);
    }

    function renderFeedbackAndNext(selectedIdx, correctIdx) {
        const q = currentQuestions[currentIndex];
        const container = document.querySelector('.quiz-panel');
        if (!container) return;
        const optionsHtml = q.options.map((opt, idx) => {
            let cls = '';
            let prefix = String.fromCharCode(65+idx);
            if (idx === correctIdx) cls = 'correct-highlight';
            else if (idx === selectedIdx && idx !== correctIdx) cls = 'wrong-highlight';
            return `<div class="option-btn ${cls} disabled-btn"><span class="option-prefix">${prefix}</span><span>${opt}</span></div>`;
        }).join('');
        container.innerHTML = `
            <div class="quiz-meta"><div class="category-badge">${q.category}</div><div class="score-timer"><div class="score-box"><span>⭐ النقاط</span> <span>${userScore}</span></div><div class="timer-box"><span>⏱️ الوقت</span> <span>${timeElapsed}s</span></div></div></div>
            <div class="question-text">${q.question}</div><div class="options-grid">${optionsHtml}</div>
            <button class="next-btn" disabled>⏳ جاري الانتقال...</button>
        `;
    }

    async function renderQuizPanel() {
        const quizPanelDiv = document.querySelector('.quiz-panel');
        if (!quizPanelDiv) return;
        if (!quizActive || currentIndex >= currentQuestions.length) {
            quizPanelDiv.innerHTML = `
                <div style="text-align:center; padding:1rem;">
                    <div style="font-size:3rem;">🏆</div>
                    <h2 style="color:#facc15;">انتهى التحدي!</h2>
                    <p style="font-size:1.5rem;">${userScore} / ${currentQuestions.length}</p>
                    <p>الزمن الكلي: ${totalTimeTaken} ثانية</p>
                    <button id="restartQuizBtn" class="next-btn">🔄 بدء اختبار جديد</button>
                </div>
            `;
            const restartBtn = document.getElementById('restartQuizBtn');
            if (restartBtn) restartBtn.onclick = () => resetQuizSession();
            return;
        }
        const q = currentQuestions[currentIndex];
        const optionsHtml = q.options.map((opt, idx) => {
            const prefix = String.fromCharCode(65+idx);
            return `<div class="option-btn" data-opt-index="${idx}"><span class="option-prefix">${prefix}</span><span>${opt}</span></div>`;
        }).join('');
        quizPanelDiv.innerHTML = `
            <div class="quiz-meta"><div class="category-badge">${q.category}</div><div class="score-timer"><div class="score-box"><span>⭐ النقاط</span> <span>${userScore}</span></div><div class="timer-box"><span>⏱️ زمن السؤال</span> <span id="questionTimer">${timeElapsed}s</span></div></div></div>
            <div class="question-text">${q.question}</div><div class="options-grid">${optionsHtml}</div>
            <button class="next-btn" disabled style="background:#475569;">✏️ اختر إجابة</button>
        `;
        const btns = quizPanelDiv.querySelectorAll('.option-btn');
        btns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.getAttribute('data-opt-index'));
                if (!isNaN(idx) && !answerLock && quizActive) onSelectAnswer(idx);
            });
        });
        updateTimerDisplay();
    }

    async function renderLeaderboard() {
        const leaderDiv = document.querySelector('.leaderboard-panel');
        if (!leaderDiv) return;
        leaderDiv.innerHTML = `<div class="leaderboard-header">🏅 لوحة الصدارة العالمية 🏅</div><div class="loading">جاري التحميل...</div>`;
        const scores = await fetchLeaderboard();
        if (scores.length === 0) {
            leaderDiv.innerHTML = `<div class="leaderboard-header">🏅 لوحة الصدارة العالمية 🏅</div><div class="leaderboard-empty">✨ لا توجد نتائج بعد. كن أول من يلعب! ✨</div>`;
            return;
        }
        let listHtml = `<div class="leaderboard-header">🌍 المتصدرون عالمياً ⚡</div><ul class="leaderboard-list">`;
        scores.slice(0,15).forEach((entry, idx) => {
            listHtml += `<li class="leaderboard-item"><div class="rank">${idx+1}</div><div class="player-name">${escapeHtml(entry.player_name)}</div><div class="player-score">${entry.score}</div><div class="player-time">⏱️ ${entry.total_time}s</div></li>`;
        });
        listHtml += `</ul>`;
        leaderDiv.innerHTML = listHtml;
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){return m==='&'?'&amp;':m==='<'?'&lt;':'&gt;';}); }

    async function resetQuizSession() {
        stopTimer();
        currentIndex = 0;
        userScore = 0;
        totalTimeTaken = 0;
        questionsCount = 0;
        answerLock = false;
        quizActive = true;
        timeElapsed = 0;
        shuffleArray(currentQuestions);
        startTimer();
        await renderQuizPanel();
        await renderLeaderboard();
    }

    function askPlayerName() {
        return new Promise((resolve) => {
            const overlay = document.createElement('div');
            overlay.className = 'name-overlay';
            overlay.innerHTML = `<div class="name-card"><h3>✨ اختبر معلوماتك ✨</h3><p>سجل اسمك وتنافس عالمياً!</p><input type="text" id="playerNameInput" placeholder="اكتب اسمك" maxlength="20"><button id="confirmNameBtn">🚀 ابدأ التحدي</button></div>`;
            document.body.appendChild(overlay);
            const input = overlay.querySelector('#playerNameInput');
            const btn = overlay.querySelector('#confirmNameBtn');
            const start = () => { currentPlayer = input.value.trim() || "متنافس"; overlay.remove(); resolve(); };
            btn.addEventListener('click', start);
            input.addEventListener('keypress', (e) => { if (e.key === 'Enter') start(); });
        });
    }

    function buildUI() {
        appContainer.innerHTML = `
            <div class="hero"><h1>🧠 تحدّي المعلومات العالمي 🧠</h1><p>تنافس مع لاعبين من جميع أنحاء العالم وسجل اسمك في لوحة الصدارة!</p></div>
            <div class="dashboard"><div class="quiz-panel"></div><div class="leaderboard-panel"></div></div>
        `;
    }

    async function init() {
        buildUI();
        await askPlayerName();
        shuffleArray(currentQuestions);
        await resetQuizSession();
    }
    init();
</script>
</body>
</html>
